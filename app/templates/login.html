<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="login-container">
      <div class="login-header">
        <h2>Bienvenido</h2>
        <p>Ingresa tus credenciales para continuar</p>
      </div>

      <!-- Formulario enviando datos por POST usando url_for dinámico de Flask -->
      <form action="{{ url_for('main.login') }}" method="POST" class="login-form">
        <div class="input-group">
          <label for="email">Correo Electrónico</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="ejemplo@correo.com"
            required
          />
        </div>

        <div class="input-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
          />
        </div>

        <!-- Renderizado de mensajes flash enviados desde Flask -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="alert-container">
              {% for category, message in messages %}
                <p class="alert {{ category }}">{{ message }}</p>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <button type="submit" class="btn-submit">Iniciar Sesión</button>
      </form>

      <p style="text-align: center; margin-top: 15px;">
        ¿No tienes cuenta? <a href="{{ url_for('main.signup') }}">Regístrate aquí</a>
      </p>
    </div>
  </body>
</html>
